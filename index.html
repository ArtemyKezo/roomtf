<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RoomTransform Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #1e1e2f, #2a2a40);
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        width: 95%;
        max-width: 700px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        text-align: center;
    }

    h1 {
        margin-bottom: 10px;
        font-size: 28px;
    }

    p {
        opacity: 0.7;
        margin-bottom: 15px;
    }

    input[type="file"] {
        margin: 10px 0;
    }

    input[type="color"] {
        width: 60px;
        height: 40px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    input[type="range"] {
        width: 100%;
        margin: 10px 0 20px;
    }

    button {
        background: linear-gradient(135deg, #4CAF50, #45a049);
        border: none;
        padding: 10px 15px;
        margin: 5px;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        transition: 0.2s;
        font-size: 14px;
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    #resetBtn {
        background: linear-gradient(135deg, #ff5f5f, #e74c3c);
    }

    #toggleBtn {
        background: linear-gradient(135deg, #3498db, #2980b9);
    }

    #downloadBtn {
        background: linear-gradient(135deg, #9b59b6, #8e44ad);
    }

    canvas {
        margin-top: 15px;
        width: 100%;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        cursor: crosshair;
    }

    label {
        font-size: 14px;
        opacity: 0.8;
    }
</style>
<body>

<div class="container">
    <h1>🏠 RoomTransform Pro</h1>

    <input type="file" id="fileInput" accept="image/*"><br>

    <input type="color" id="colorPicker" value="#4CAF50">
    <br>

    <label>Чувствительность:</label>
    <input type="range" id="threshold" min="0" max="1" step="0.01" value="0.2">

    <br>

    <button id="applyBtn">Применить</button>
    <button id="resetBtn">Сброс</button>
    <button id="toggleBtn">До / После</button>
    <button id="downloadBtn">Скачать</button>

    <p>👉 Кликни по стене, чтобы выбрать цвет</p>

    <canvas id="canvas"></canvas>
</div>

<script src="app.js"></script>
</body>
</html>
